<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:1200px;height:630px;background:#162e16;overflow:hidden;
  font-family:'Georgia','Times New Roman',serif;position:relative;
}
body::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(45deg,rgba(0,0,0,0.04) 0,rgba(0,0,0,0.04) 1px,transparent 1px,transparent 7px),
    repeating-linear-gradient(-45deg,rgba(0,0,0,0.02) 0,rgba(0,0,0,0.02) 1px,transparent 1px,transparent 7px);
  pointer-events:none;z-index:0;
}
.frame-outer{position:absolute;inset:10px;border:3px solid #c9a540;z-index:1}
.frame-inner{position:absolute;inset:16px;border:1px solid rgba(201,165,64,0.35);z-index:1}
.frame-corner{position:absolute;font-size:15px;color:#c9a540;z-index:2;line-height:1;font-family:serif}
.fc-tl{top:18px;left:18px}.fc-tr{top:18px;right:18px;text-align:right}
.fc-bl{bottom:78px;left:18px}.fc-br{bottom:78px;right:18px;text-align:right}

.cards-left,.cards-right{position:absolute;top:50%;z-index:2}
.cards-left{left:50px;transform:translateY(-58%)}
.cards-right{right:50px;transform:translateY(-58%)}
.card{
  position:absolute;width:100px;height:145px;border-radius:7px;
  border:2px solid #bbb;box-shadow:3px 3px 12px rgba(0,0,0,0.7);
  background:#fff;
}
.card-back{
  background:linear-gradient(135deg,#1a3a7c 0%,#2d5ab4 50%,#1a3a7c 100%);
  border:2px solid #3d6fd4;
}
.card-ace{background:#fff;display:flex;flex-direction:column;align-items:flex-start;padding:8px}
.card-king{background:#fff;display:flex;flex-direction:column;align-items:flex-start;padding:8px}
.card-label{font-size:22px;font-weight:700;line-height:1;font-family:'Georgia',serif}
.card-suit{font-size:18px;line-height:1}
.red{color:#cc0000}

.center{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:640px;text-align:center;z-index:2}
h1{
  font-size:100px;color:#f0c040;font-weight:700;letter-spacing:-2px;line-height:1;
  text-shadow:0 0 50px rgba(240,192,64,0.5),0 0 20px rgba(240,192,64,0.3),0 3px 6px rgba(0,0,0,0.8);
  margin-bottom:12px;
}
.mug{font-size:64px;display:block;margin-bottom:10px}
.subhead{
  font-size:17px;color:#c9a540;letter-spacing:9px;text-transform:uppercase;
  font-family:'Georgia',serif;
}
.divider{
  width:320px;height:1px;margin:18px auto;
  background:linear-gradient(to right,transparent,#c9a540 30%,#c9a540 70%,transparent);
}
.tagline{font-size:19px;color:#e8dcc0;font-style:italic;font-family:'Georgia',serif}

.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;height:68px;z-index:3;
  background:linear-gradient(to right,#7a5a18,#c9a540 20%,#e8c060 50%,#c9a540 80%,#7a5a18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.bottom-url{font-family:'Georgia',serif;font-size:15px;color:#1a0e00;font-weight:700;letter-spacing:0.4px}
.bottom-features{font-size:12.5px;color:#2e1a00;letter-spacing:0.3px;font-family:Arial,sans-serif}
</style>
</head>
<body>
<div class="frame-outer"></div>
<div class="frame-inner"></div>
<div class="frame-corner fc-tl">♠ ♥</div>
<div class="frame-corner fc-tr">♦ ♣</div>
<div class="frame-corner fc-bl">♣ ♦</div>
<div class="frame-corner fc-br">♥ ♠</div>

<div class="cards-left">
  <div style="position:relative;width:150px;height:200px">
    <div class="card card-back" style="transform:rotate(-30deg);top:30px;left:5px"></div>
    <div class="card card-back" style="transform:rotate(-18deg);top:18px;left:12px"></div>
    <div class="card card-back" style="transform:rotate(-8deg);top:8px;left:18px"></div>
    <div class="card card-ace" style="transform:rotate(3deg);top:0;left:24px">
      <span class="card-label">A</span><span class="card-suit">♠</span>
    </div>
  </div>
</div>

<div class="cards-right">
  <div style="position:relative;width:150px;height:200px">
    <div class="card card-back" style="transform:rotate(30deg);top:30px;right:5px;left:auto"></div>
    <div class="card card-back" style="transform:rotate(18deg);top:18px;right:12px;left:auto"></div>
    <div class="card card-back" style="transform:rotate(8deg);top:8px;right:18px;left:auto"></div>
    <div class="card card-king" style="transform:rotate(-3deg);top:0;right:24px;left:auto">
      <span class="card-label red">K</span><span class="card-suit red">♥</span>
    </div>
  </div>
</div>

<div class="center">
  <h1>Last Round</h1>
  <span class="mug">🍺</span>
  <div class="subhead">The Pub Card Game</div>
  <div class="divider"></div>
  <div class="tagline">Last one holding cards buys the round!</div>
</div>

<div class="bottom-bar">
  <div class="bottom-url">last-round-card-game.web.app &nbsp;·&nbsp; Free &nbsp;·&nbsp; No download &nbsp;·&nbsp; 2–4 Players</div>
  <div class="bottom-features">🍺 Drinking Mode &nbsp;&nbsp;·&nbsp;&nbsp; 🌐 Online Multiplayer &nbsp;&nbsp;·&nbsp;&nbsp; 📱 Pass &amp; Play &nbsp;&nbsp;·&nbsp;&nbsp; 🏆 League System &nbsp;&nbsp;·&nbsp;&nbsp; ⚔️ Duels</div>
</div>
</body>
</html>
