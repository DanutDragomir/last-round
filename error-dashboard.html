<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Round — Error Monitoring Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
    }
    .card h2 {
      font-size: 14px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }
    .card .value {
      font-size: 36px;
      font-weight: bold;
      color: #fff;
    }
    .card.alert {
      border-color: #ff4444;
    }
    .card.alert .value {
      color: #ff6666;
    }
    .errors-table {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #0f0f0f;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid #333;
      color: #888;
      text-transform: uppercase;
      font-size: 12px;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #2a2a2a;
    }
    tr:hover {
      background: #222;
    }
    .error-type {
      background: #1a3a2a;
      color: #6fa08a;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .error-type.firebase {
      background: #3a2a1a;
      color: #a0826a;
    }
    .error-type.network {
      background: #3a1a2a;
      color: #a06a8a;
    }
    .timestamp {
      color: #666;
      font-size: 12px;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    button {
      background: #2a6a4f;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      background: #2a7a5f;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .chart {
      height: 200px;
      background: #0f0f0f;
      border-radius: 4px;
      margin-top: 10px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 10px;
    }
    .bar {
      flex: 1;
      background: #2a6a4f;
      border-radius: 2px;
      min-height: 2px;
      position: relative;
    }
    .bar-label {
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍺 Last Round — Error Monitoring</h1>

    <div class="controls">
      <button onclick="loadData()">🔄 Refresh</button>
      <button onclick="clearOldErrors()">🗑️ Clear Old</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Active Sessions (24h)</h2>
        <div class="value" id="sessionCount">—</div>
      </div>
      <div class="card">
        <h2>Total Errors (24h)</h2>
        <div class="value" id="errorCount">—</div>
      </div>
      <div class="card" id="errorRateCard">
        <h2>Error Rate</h2>
        <div class="value" id="errorRate">—</div>
      </div>
      <div class="card">
        <h2>Most Common</h2>
        <div class="value" id="mostCommon" style="font-size: 16px;">—</div>
      </div>
    </div>

    <div class="card">
      <h2>Error Breakdown (by category)</h2>
      <div class="chart" id="errorChart"></div>
    </div>

    <div class="errors-table">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Type</th>
            <th>Message</th>
            <th>Category</th>
            <th>Session</th>
          </tr>
        </thead>
        <tbody id="errorList">
          <tr class="loading">
            <td colspan="5">Loading errors...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getDatabase, ref, get, child, remove, query, orderByChild, limitToLast, startAt } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';

    // Firebase config (same as game)
    const firebaseConfig = {
      apiKey: "AIzaSyC3m5-pE87aE3yGGJMqsHhzXQK0KJNhWFw",
      authDomain: "last-round-card-game.firebaseapp.com",
      databaseURL: "https://last-round-card-game-default-rtdb.firebaseio.com",
      projectId: "last-round-card-game",
      storageBucket: "last-round-card-game.appspot.com",
      messagingSenderId: "476928778048",
      appId: "1:476928778048:web:4c3a9c4c3f3f3c3f3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allErrors = [];

    window.loadData = async function() {
      try {
        const snapshot = await get(child(ref(db), 'errors'));
        if (!snapshot.exists()) {
          document.getElementById('errorList').innerHTML = '<tr class="loading"><td colspan="5">No errors recorded.</td></tr>';
          return;
        }

        const data = snapshot.val();
        allErrors = [];
        const sessionMap = {};

        Object.keys(data).forEach(sessionId => {
          const session = data[sessionId];
          if (typeof session === 'object') {
            Object.keys(session).forEach(errorId => {
              const error = session[errorId];
              error.sessionId = sessionId;
              error.timestamp = error.timestamp || 0;
              allErrors.push(error);
            });
          }
          sessionMap[sessionId] = true;
        });

        // Sort by timestamp descending
        allErrors.sort((a, b) => b.timestamp - a.timestamp);

        // Display stats
        updateStats(sessionMap);
        renderErrors(allErrors.slice(0, 50)); // Show latest 50
      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('errorList').innerHTML = `<tr><td colspan="5" style="color: #ff6666;">Error: ${error.message}</td></tr>`;
      }
    };

    function updateStats(sessionMap) {
      const sessionCount = Object.keys(sessionMap).length;
      const errorCount = allErrors.length;
      const errorRate = errorCount > 0 ? (errorCount / (sessionCount || 1) / 24).toFixed(3) : '0.000';

      document.getElementById('sessionCount').textContent = sessionCount;
      document.getElementById('errorCount').textContent = errorCount;
      document.getElementById('errorRate').textContent = `${(errorRate * 100).toFixed(2)}%`;

      // Alert if error rate > 1%
      const card = document.getElementById('errorRateCard');
      if (parseFloat(errorRate) > 0.01) {
        card.classList.add('alert');
      } else {
        card.classList.remove('alert');
      }

      // Most common error type
      const typeCount = {};
      allErrors.forEach(e => {
        typeCount[e.category || e.type] = (typeCount[e.category || e.type] || 0) + 1;
      });
      const mostCommon = Object.entries(typeCount).sort((a, b) => b[1] - a[1])[0];
      document.getElementById('mostCommon').textContent = mostCommon ? `${mostCommon[0]} (${mostCommon[1]})` : 'None';

      // Chart
      renderChart(typeCount);
    }

    function renderChart(typeCount) {
      const chart = document.getElementById('errorChart');
      chart.innerHTML = '';
      const max = Math.max(...Object.values(typeCount), 1);

      Object.entries(typeCount).forEach(([type, count]) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = `${(count / max) * 100}%`;
        bar.innerHTML = `<div class="bar-label">${type}<br>${count}</div>`;
        bar.title = `${type}: ${count} errors`;
        chart.appendChild(bar);
      });
    }

    function renderErrors(errors) {
      const tbody = document.getElementById('errorList');
      if (errors.length === 0) {
        tbody.innerHTML = '<tr class="loading"><td colspan="5">No errors recorded.</td></tr>';
        return;
      }

      tbody.innerHTML = errors.map(e => `
        <tr>
          <td class="timestamp">${new Date(e.timestamp).toLocaleTimeString()}</td>
          <td><span class="error-type ${e.category || 'unknown'}">${e.type || 'unknown'}</span></td>
          <td style="max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${e.message || 'No message'}</td>
          <td>${e.category || '—'}</td>
          <td style="font-size: 11px; color: #666;">${e.sessionId.substring(0, 8)}…</td>
        </tr>
      `).join('');
    }

    window.clearOldErrors = async function() {
      if (!confirm('Delete errors older than 7 days?')) return;
      const cutoff = Date.now() - (7 * 24 * 60 * 60 * 1000);
      let deleted = 0;

      for (const error of allErrors) {
        if (error.timestamp < cutoff) {
          try {
            await remove(ref(db, `errors/${error.sessionId}/${error.timestamp}`));
            deleted++;
          } catch (e) {
            console.error('Error deleting:', e);
          }
        }
      }

      alert(`Deleted ${deleted} old errors.`);
      loadData();
    };

    // Load on init
    loadData();

    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);
  </script>
</body>
</html>
